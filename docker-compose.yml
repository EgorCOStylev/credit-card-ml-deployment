version: "3.9"

services:
  # ── ML Service (v1) ──────────────────────────────────────────────────────────
  ml-service-v1:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-default-ml:v1
    container_name: ml_service_v1
    ports:
      - "5001:5000"
    environment:
      - AB_SPLIT=0.0    # Force v1 only on this instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── ML Service (v2) ──────────────────────────────────────────────────────────
  ml-service-v2:
    build:
      context: .
      dockerfile: Dockerfile
    image: credit-default-ml:v2
    container_name: ml_service_v2
    ports:
      - "5002:5000"
    environment:
      - AB_SPLIT=1.0    # Force v2 only on this instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NGINX — A/B traffic router ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_router
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ml-service-v1
      - ml-service-v2
    restart: unless-stopped

# Networks (default bridge is fine for local dev)
networks:
  default:
    name: ml_network
