events {
    worker_connections 1024;
}

http {
    # Upstream для двух версий модели
    upstream ml_v1 {
        server ml-service-v1:5000;
    }

    upstream ml_v2 {
        server ml-service-v2:5000;
    }

    # Split map: используем $request_id как источник случайности
    # ~50% трафика на v2 (split для A/B теста)
    split_clients "${remote_addr}${time_iso8601}" $ml_backend {
        50%   ml_v1;
        *     ml_v2;
    }

    server {
        listen 80;
        server_name _;

        # Логирование в JSON
        log_format json_log escape=json
            '{"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"upstream":"$upstream_addr",'
            '"response_time":$request_time}';

        access_log /var/log/nginx/access.log json_log;

        # Маршрут /predict — A/B split
        location /predict {
            proxy_pass http://$ml_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check всегда на v1
        location /health {
            proxy_pass http://ml_v1;
        }

        # Остальные маршруты — v1
        location / {
            proxy_pass http://ml_v1;
        }
    }
}
